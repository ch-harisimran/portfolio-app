services:
  - type: web
    name: pakfinance-api
    runtime: python
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
        sync: false
      - key: PYTHON_VERSION
        value: 3.12
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: pserv
    name: pakfinance-db
    runtime: postgresql
    databaseName: portfolio_db
    user: portfolio
    ipAllowList: []

databases:
  - name: portfolio_db
    databaseName: portfolio_db
    user: portfolio
