version: "3.9"

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: []  # Don't expose DB port in production

  backend:
    environment:
      DATABASE_URL: postgresql://portfolio:${POSTGRES_PASSWORD}@db:5432/portfolio_db
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      ENVIRONMENT: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports: []  # Reverse proxy handles this

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    ports: []

  nginx:
    image: nginx:alpine
    container_name: pakfinance_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
